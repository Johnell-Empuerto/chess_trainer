name: chess_trainer
description: A modern chess trainer application built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  chess: ^0.8.1
  path: ^1.9.0
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.24
  file_picker: ^11.0.2


flutter:
  uses-material-design: true
  assets:
    - assets/pieces/
    - assets/openings/
